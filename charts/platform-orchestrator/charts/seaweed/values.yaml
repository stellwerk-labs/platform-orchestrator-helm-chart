# SeaweedFS configuration (S3-compatible object storage)

# -- Enable SeaweedFS
enabled: true

# -- Global image settings
image:
  # -- Image repository
  repository: chrislusf/seaweedfs
  # -- Image tag
  tag: "latest"
  # -- Image pull policy
  pullPolicy: Always

# -- Master server configuration
master:
  # -- Number of master replicas
  replicas: 1
  # -- Whether to start masters concurrently
  concurrentStart: false
  # -- Garbage collection threshold (fraction of wasted space to trigger GC)
  garbageThreshold: "0.3"
  # -- Maximum volume size in MB
  volumeSizeLimitMB: 30000
  # -- CPU request for master
  requests:
    cpu: "100m"
    memory: "128Mi"
  # -- CPU/memory limits for master
  limits:
    cpu: "200m"
    memory: "256Mi"

# -- Filer component configuration
filer:
  # -- Number of filer replicas
  replicas: 1
  # -- Enable IAM for S3 authentication
  iam: true
  # -- Custom filer.toml configuration
  config: |
    [leveldb2]
    enabled = true
    dir = "/data/filerdb2"

  # -- S3 settings within filer
  s3:
    configSecret:
      # -- Secret name containing the S3 configuration
      name: "s3-secret"
      # -- Key within the secret
      key: "config"

  # -- Filer persistence settings
  persistence:
    # -- Enable persistent storage for the filer
    enabled: false
    # -- Storage class name
    storageClassName: "gp2"
    # -- Access modes for the PVC
    accessModes: ["ReadWriteOnce"]
    # -- Mount path for persistent storage
    mountPath: "/data"
    # -- Storage requests
    requests:
      # -- PVC storage size
      storage: "4Gi"

  # -- CPU/memory requests for filer
  requests:
    cpu: "200m"
    memory: "256Mi"
  # -- CPU/memory limits for filer
  limits:
    cpu: "1000m"
    memory: "512Mi"

# -- Volume server configuration
volume:
  # -- Number of volume server replicas
  replicas: 1
  # -- Volume server port
  port: 8080
  # -- Data center name (required by SeaweedFS CRD)
  dataCenter: "DefaultDataCenter"
  # -- Rack name (required by SeaweedFS CRD)
  rack: "DefaultRack"
  # -- Volume server storage size
  storage: "50Gi"
  # -- CPU/memory resource requests and limits for volume server
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "400m"
      memory: "512Mi"
