{{- if .Values.enabled }}
apiVersion: seaweed.seaweedfs.com/v1
kind: Seaweed
metadata:
  name: {{ include "seaweed.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "seaweed.labels" . | nindent 4 }}
spec:
  # The CRD expects a single string for 'image'
  image: {{ printf "%s:%s" .Values.image.repository .Values.image.tag }}
  imagePullPolicy: {{ .Values.image.pullPolicy }}

  master:
    replicas: {{ .Values.master.replicas }}
    {{- with .Values.master.resources }}
    requests:
      {{- toYaml .requests | nindent 6 }}
    limits:
      {{- toYaml .limits | nindent 6 }}
    {{- end }}

  volume:
    replicas: {{ .Values.volume.replicas }}
    # Required by CRD
    dataCenter: {{ .Values.volume.dataCenter | default "DefaultDataCenter" | quote }}
    rack: {{ .Values.volume.rack | default "DefaultRack" | quote }}
    # The CRD does NOT have a persistence field here.
    # Use requests directly for storage if the controller supports it,
    # or use the 'volumes' and 'volumeMounts' arrays defined in the CRD.
    requests:
      storage: {{ .Values.volume.storage }}
      {{- with .Values.volume.resources }}
      {{- toYaml .requests | nindent 6 }}
      {{- end }}
    {{- with .Values.volume.resources }}
    limits:
      {{- toYaml .limits | nindent 6 }}
    {{- end }}

  filer:
    replicas: {{ .Values.filer.replicas }}
    s3:
      enabled: true
      {{- if .Values.filer.s3.configSecret }}
      configSecret:
        name: {{ .Values.filer.s3.configSecret.name }}
        key: {{ .Values.filer.s3.configSecret.key }}
      {{- end }}
    iam: {{ .Values.filer.iam }}
    # Flat resource mapping
    {{- with .Values.filer.resources }}
    requests:
      {{- toYaml .requests | nindent 6 }}
    limits:
      {{- toYaml .limits | nindent 6 }}
    {{- end }}
    config: |
{{ .Values.filer.config | indent 6 }}
{{- end }}