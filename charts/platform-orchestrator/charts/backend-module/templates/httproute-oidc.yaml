{{- if and .Values.global.gatewayApi.enabled .Values.global.gatewayApi.oidc }}
{{- $fullname := include "backend-module.fullname" . }}
{{- with .Values.gatewayApiOidc.route }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullname }}-oidc
  labels:
    {{- include "backend-module.labels" $ | nindent 4 }}
spec:
  parentRefs:
    - name: {{ $.Release.Name }}-oidc-gateway
  hostnames:
    - {{ $.Values.global.gatewayApi.oidc.hostname | quote }}
  rules:
    {{- with .matches }}
    - matches:
        {{- toYaml . | nindent 8 }}
      backendRefs:
        - name: {{ $fullname }}
          port: {{ $.Values.service.port }}
      filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            add:
              - name: Cache-Control
                value: "no-cache"
              - name: Pragma
                value: "no-cache"
              - name: Referrer-Policy
                value: "strict-origin-when-cross-origin"
              - name: X-Content-Type-Options
                value: "nosniff"
    {{- end }}
{{- end }}
{{- end }}
