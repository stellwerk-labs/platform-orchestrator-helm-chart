{{- if .Values.global.gatewayApi.enabled }}
{{- $fullname := include "backend-module.fullname" . -}}
{{- with .Values.gatewayApi.route }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullname }}
  labels:
    {{- include "backend-module.labels" $ | nindent 4 }}
spec:
  parentRefs:
    - name: {{ $.Release.Name }}-backend-gateway
  hostnames:
    - {{ $.Values.global.gatewayApi.backend.hostname | quote }}
  rules:
    - matches:
        {{- toYaml .matches | nindent 8 }}
      backendRefs:
        - name: {{ $fullname }}
          port: {{ $.Values.service.port }}
      {{- with .timeouts }}
      timeouts:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            add:
              - name: Cache-Control
                value: "no-cache"
              - name: Pragma
                value: "no-cache"
              - name: Referrer-Policy
                value: "strict-origin-when-cross-origin"
              - name: X-Content-Type-Options
                value: "nosniff"
    {{- with .admin }}
    - matches:
        {{- toYaml .matches | nindent 8 }}
      backendRefs:
        - name: {{ $fullname }}
          port: {{ $.Values.service.port }}
      filters:
        - type: URLRewrite
          urlRewrite:
            {{- toYaml .rewrite | nindent 12 }}
    {{- end }}
{{- end }}
{{- end }}
