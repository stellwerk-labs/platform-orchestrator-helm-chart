apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "console.fullname" . }}-config
  labels:
    {{- include "console.labels" . | nindent 4 }}
data:
  BASE_URL: http{{ if .Values.global.gatewayApi.backend.https }}s{{ end }}://{{ .Values.global.gatewayApi.backend.hostname }}
  {{- with .Values.config }}
  {{- toYaml . | nindent 2 }}
  {{- end }}
