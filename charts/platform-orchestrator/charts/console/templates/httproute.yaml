{{- if .Values.global.gatewayApi.enabled }}
{{- $fullname := include "console.fullname" . -}}
{{- with .Values.gatewayApi.route }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullname }}
  labels:
    {{- include "console.labels" $ | nindent 4 }}
spec:
  parentRefs:
    - name: {{ $.Release.Name }}-frontend-gateway
  hostnames:
    - {{ $.Values.global.gatewayApi.frontend.hostname | quote }}
  rules:
    {{- with .matches }}
    - matches:
        {{- toYaml . | nindent 8 }}
      backendRefs:
        - name: {{ $fullname }}
          port: {{ $.Values.service.port }}
      filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            add:
              - name: Cache-Control
                value: "no-cache"
              - name: Pragma
                value: "no-cache"
              - name: Referrer-Policy
                value: "strict-origin-when-cross-origin"
              - name: X-Content-Type-Options
                value: "nosniff"
              - name: X-Frame-Options
                value: "DENY"
              - name: Content-Security-Policy
                value: "script-src 'self' 'unsafe-inline' 'unsafe-eval' accounts.google.com https://hcaptcha.com https://*.hcaptcha.com https://*.wistia.com https://*.wistia.net; frame-src accounts.google.com https://hcaptcha.com https://*.hcaptcha.com; worker-src blob:;"
    {{- end }}
{{- end }}
{{- end }}
