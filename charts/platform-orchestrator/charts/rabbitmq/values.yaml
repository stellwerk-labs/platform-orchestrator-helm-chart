# RabbitMQ Cluster configuration (RabbitMQ Cluster Operator)

# -- Enable the RabbitMQ cluster
enabled: true

# -- Number of RabbitMQ replicas
replicas: 1

# -- Container image configuration
image:
  # -- Image repository
  repository: rabbitmq
  # -- Image tag
  tag: 3.12-management

# -- CPU/memory resource requests and limits
resources:
  requests:
    cpu: '500m'
    memory: 2Gi
  limits:
    cpu: '2'
    memory: 4Gi

# -- Persistence configuration
persistence:
  # -- Storage class name
  storageClassName: standard
  # -- PVC storage size
  storage: 1Gi

# -- Additional RabbitMQ configuration (rabbitmq.conf format)
# disk_free_limit.absolute is set to 50MB instead of relative=1.0 because the
# chart ships persistence.storage: 1Gi but the resource limit memory is 4Gi.
# A relative=1.0 threshold would demand ~4Gi free disk and fire the alarm
# permanently, TCP-blocking every publisher. Override the default if you
# size the PVC larger.
additionalConfig: |
  cluster_partition_handling = pause_minority
  vm_memory_high_watermark_paging_ratio = 0.99
  disk_free_limit.absolute = 50MB
  collect_statistics_interval = 10000

# -- Pod affinity rules
affinity: {}

# -- RabbitmqCluster spec overrides
override:
  # -- Additional annotations on the RabbitmqCluster resource
  #  Example (Datadog integration):
  #  annotations:
  #    ad.datadoghq.com/rabbitmq.checks: |
  #      {
  #        "rabbitmq": {
  #          "init_config": {},
  #          "instances": [{
  #            "rabbitmq_api_url":"http://%%host%%:15672/api/",
  #            "username": "datadog",
  #            "password": "%%env_RABBITMQ_USER_DATADOG_PASSWORD%%"
  #          }]
  #        }
  #      }
  annotations: {}
  # -- Topology spread constraints
  topologySpreadConstraints: []

# -- Virtual host configuration
vhost:
  # -- Virtual host name
  name: platform
