{{- if .Values.global.gatewayApi.enabled }}
{{- with .Values.global.gatewayApi.keycloak }}
{{- if .hostname }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "keycloak.fullname" $ }}
  labels:
    {{- include "keycloak.labels" $ | nindent 4 }}
spec:
  parentRefs:
    - name: {{ $.Release.Name }}-keycloak-gateway
  hostnames:
    - {{ .hostname | quote }}
  rules:
    - backendRefs:
        - name: {{ include "keycloak.fullname" $ }}-service
          port: 8080
      matches:
        - path:
            type: PathPrefix
            value: /
{{- end }}
{{- end }}
{{- end }}
