# SpiceDB configuration (Zanzibar-inspired authorization)

# -- Enable SpiceDB
enabled: true

# -- Number of SpiceDB replicas
replicas: 1

# -- Name of the secret containing the SpiceDB cluster config (preshared key)
secretName: spicedb-cluster-config

# -- Init container configuration for creating the secret
initContainer:
  # -- kubectl image used by the init container
  image: bitnami/kubectl:latest

