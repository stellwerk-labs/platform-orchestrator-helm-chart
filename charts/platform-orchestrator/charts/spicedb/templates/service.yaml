apiVersion: v1
kind: Service
metadata:
  name: {{ include "spicedb.fullname" . }}
  labels:
    {{ include "spicedb.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/instance: {{ include "spicedb.fullname" . }}-cluster-spicedb
  type: ClusterIP
  ports:
    - name: grpc
      port: 50051
      protocol: TCP
      targetPort: 50051
    - name: gateway
      port: 8443
      protocol: TCP
      targetPort: 8443
    - name: metrics
      port: 9090
      protocol: TCP
      targetPort: 9090
