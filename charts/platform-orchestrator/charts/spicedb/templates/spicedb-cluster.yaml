apiVersion: authzed.com/v1alpha1
kind: SpiceDBCluster
metadata:
  name: {{ include "spicedb.fullname" . }}-cluster
  labels:
    {{- include "spicedb.labels" . | nindent 4 }}
spec:
  config:
    datastoreEngine: postgres
    replicas: {{ .Values.replicas }}
  patches:
    - kind: Job
      patch:
        spec:
          template:
            spec:
              initContainers:
                - name: update-secret
                  image: {{ .Values.initContainer.image }}
                  env:
                    - name: DB_PASSWORD
                      valueFrom:
                        secretKeyRef:
                          name: {{ .Values.global.spicedb.database.passwordSecretName }}
                          key: {{ .Values.global.spicedb.database.passwordSecretKey }}
                    - name: SECRET_NAME
                      value: {{ .Values.secretName }}
                    - name: NAMESPACE
                      value: {{ .Release.Namespace }}
                    - name: DB_HOST
                      value: {{ .Values.global.spicedb.database.host }}
                    - name: DB_PORT
                      value: {{ .Values.global.spicedb.database.port | quote }}
                    - name: DB_NAME
                      value: {{ .Values.global.spicedb.database.name }}
                    - name: DB_USER
                      value: {{ .Values.global.spicedb.database.owner }}
                  command:
                    - sh
                    - -c
                    - |
                      DATASTORE_URI="postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}"
                      kubectl patch secret "${SECRET_NAME}" \
                        --namespace="${NAMESPACE}" \
                        --type=merge \
                        -p "{\"stringData\":{\"datastore_uri\":\"${DATASTORE_URI}\"}}"
    {{- with .Values.patches }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  secretName: {{ .Values.secretName }}
