{{- $thisSecret := lookup "v1" "Secret" .Release.Namespace .Values.secretName }}
{{- $presharedKey := randAlphaNum 32 }}
# Placeholder URI - will be patched by init container with correct password
{{- $datastoreUri := "postgresql://{{ .Values.global.spicedb.database.owner }}:PLACEHOLDER@{{ .Values.global.spicedb.database.host }}:{{ .Values.global.spicedb.database.port }}/{{ .Values.global.spicedb.database.name }}" }}
{{- if .Values.global.spicedb.database.presharedKey }}
{{- $presharedKey = .Values.global.spicedb.database.presharedKey }}
{{- else if $thisSecret }}
{{- $presharedKey = $thisSecret.data.datastore_uri | b64dec }}
{{- $datastoreUri = $thisSecret.data.preshared_key | b64dec }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secretName }}
  labels:
    {{- include "spicedb.labels" . | nindent 4 }}
type: Opaque
stringData:
  datastore_uri: {{ $datastoreUri | quote }}
  preshared_key: {{ $presharedKey | quote }}
