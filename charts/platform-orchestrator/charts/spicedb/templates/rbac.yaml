apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "spicedb.fullname" . }}-secret-manager
  labels:
    {{- include "spicedb.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "update", "patch", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "spicedb.fullname" . }}-secret-manager
  labels:
    {{- include "spicedb.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "spicedb.fullname" . }}-secret-manager
subjects:
  - kind: ServiceAccount
    name: {{ include "spicedb.fullname" . }}-cluster
    namespace: {{ .Release.Namespace }}
