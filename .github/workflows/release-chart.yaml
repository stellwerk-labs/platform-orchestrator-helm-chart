name: Release Chart

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout selected release tag
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Validate signed release tag and chart version
        id: chart
        shell: bash
        run: |
          set -euo pipefail
          release_tag="$(git tag --contains HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1)"
          test -n "$release_tag"
          chart_version="$(helm show chart charts/platform-orchestrator | awk '$1 == "version:" { print $2 }')"
          test "v$chart_version" = "$release_tag"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "chart_version=$chart_version" >> "$GITHUB_OUTPUT"

      - name: Lint and package chart
        run: |
          set -euo pipefail
          helm dependency build charts/platform-orchestrator
          helm lint charts/platform-orchestrator
          mkdir -p dist
          helm package charts/platform-orchestrator --destination dist

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish OCI chart and GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          chart="dist/platform-orchestrator-${{ steps.chart.outputs.chart_version }}.tgz"
          helm push "$chart" oci://ghcr.io/stellwerk-labs/charts
          gh release create "${{ steps.chart.outputs.release_tag }}" "$chart" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --generate-notes
