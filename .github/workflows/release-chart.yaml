name: Release Chart

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Signed chart tag to publish (for example v0.1.5)
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout selected release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release_tag }}
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Validate selected release tag and chart version
        id: chart
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          release_tag="$RELEASE_TAG"
          printf '%s\n' "$release_tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'
          chart_version="$(awk '$1 == "version:" { print $2; exit }' charts/platform-orchestrator/Chart.yaml)"
          printf 'Selected tag: <%s>; chart version: <%s>\n' "$release_tag" "$chart_version"
          test "v$chart_version" = "$release_tag"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "chart_version=$chart_version" >> "$GITHUB_OUTPUT"

      - name: Lint and package chart
        run: |
          set -euo pipefail
          helm dependency build charts/platform-orchestrator
          helm lint charts/platform-orchestrator
          mkdir -p dist
          helm package charts/platform-orchestrator --destination dist

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish OCI chart and GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          chart="dist/platform-orchestrator-${{ steps.chart.outputs.chart_version }}.tgz"
          helm push "$chart" oci://ghcr.io/stellwerk-labs/charts
          gh release create "${{ steps.chart.outputs.release_tag }}" "$chart" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --generate-notes
