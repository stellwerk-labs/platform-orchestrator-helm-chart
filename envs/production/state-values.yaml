installEnvoyGateway: true

installPostgres: true

installCertManager: true

installRabbitMQ: true

installSpiceDB: true

installKeycloak: true

installSeaweed: true

installOpenTelemetry: true

installVault: true

initialOrgId: ""

gatewayclassValues: {}

platformOrchestratorValues:
  rabbitmq:
    replicas: 3
    affinity:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                    - platform-orchestrator-rabbitmq
            topologyKey: kubernetes.io/hostname
    persistence:
      storage: 10Gi
    override:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: "topology.kubernetes.io/zone"
          whenUnsatisfiable: DoNotSchedule

  spicedb:
    replicas: 2

seaweedfsOperatorValues: {}

vaultValues:
  injector:
    enabled: false
  server:
    standalone:
      enabled: false
    dataStorage:
      enabled: true
      size: 10Gi
    ha:
      enabled: true
      replicas: 3
      raft:
        enabled: true
      config: |
        ui = true

        listener "tcp" {
          tls_disable = 1
          address = "[::]:8200"
          cluster_address = "[::]:8201"

          telemetry {
            unauthenticated_metrics_access = true
          }
        }

        telemetry {
          disable_hostname = true
          prometheus_retention_time = "12h"
        }

openTelemetryOperatorValues:
  manager:
    createRbacPermissions: true
  admissionWebhooks:
    certManager:
      enabled: true
      issuerRef:
        name: selfsigned-cluster-issuer
        kind: ClusterIssuer
      duration: 8760h
      renewBefore: 360h

openTelemetryValues:
  collector:
    resources:
      requests:
        cpu: 200m
        memory: 400Mi
      limits:
        cpu: "1"
        memory: 2Gi
